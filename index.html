<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Електронна бібліотека</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-card">
        <div class="login-title">Електронна бібліотека</div>
        
        <div id="message-box"></div>

        <form id="student-form">
            <div class="input-wrapper">
                <span class="icon">👤</span>
                <input type="text" id="first_name" placeholder="Ім'я" required>
            </div>
            
            <div class="input-wrapper">
                <span class="icon">📝</span>
                <input type="text" id="last_name" placeholder="Прізвище" required>
            </div>

            <div class="input-wrapper">
                <span class="icon">🎓</span>
                <input type="text" id="group_name" placeholder="Група (напр., КН-31)" required>
            </div>
            
            <button type="submit" class="btn-login">УВІЙТИ</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
